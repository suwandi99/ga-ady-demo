<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Garuda Indonesia</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://checkoutshopper-test.adyen.com/checkoutshopper/sdk/5.66.0/adyen.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Extracting essential Garuda Styles from MHTML [cite: 5] */
        body { background: #f5f5f5; font-family: 'Poppins', sans-serif; margin: 0; }
        #main-header { background: #fff; border-bottom-left-radius: 125px; margin-bottom: 42px; padding: 10px 15px; }
        .time-header { background: #28447a; color: #fff; text-align: center; padding: 12px; border-bottom-left-radius: 125px; }
        
        #main-container { display: flex; max-width: 1200px; margin: 0 auto; padding: 20px; gap: 20px; }
        #payment-options-wrapper { flex: 1; background: #fff; border-radius: 8px; padding: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .booking-info-container { width: 330px; }
        
        .payment-method-title { color: #24437f; font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .blue-wrapper { background: #fff; border-radius: 8px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .booking-info { background: #fff; border-radius: 8px; padding: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        
        /* Buttons [cite: 1008, 1011] */
        .btn-red { background: #c42812; color: #fff; border: none; border-radius: 20px; height: 40px; width: 100%; cursor: pointer; font-weight: 600; }
        .price-total-amount { font-size: 18px; font-weight: 700; color: #24437f; float: right; }
        .flight-info-group { border-bottom: 1px solid #e5e5e5; padding: 10px 0; color: #939191; }
        h3 { color: #24437f; font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

<header id="main-header">
    <div class="container wrapper">
        <img src="https://pay.garuda-indonesia.com/images/logo.png" style="height:54px;">
        <div class="steps"><img src="https://pay.garuda-indonesia.com/images/steps/step3.png" style="height:54px;"></div>
    </div>
    <div class="time-header">
        Booking/Transaction expires in: <time id="countdown">00:30:00</time>
    </div>
</header>

<section id="main-container">
    <div id="payment-options-wrapper">
        <h5 class="payment-method-title">Payment Method</h5>
        <div id="dropin-container">
            </div>
    </div>

    <div class="booking-info-container">
        <div class="blue-wrapper">
            <h5 style="color:#24437f; font-weight:600;">Voucher</h5>
            <input type="text" placeholder="Input 8 Digit Voucher Code" style="width:100%; padding:10px; border-radius:20px; border:1px dotted #ccc; margin-bottom:10px;">
            <button class="btn-red">Apply</button>
        </div>

        <aside class="booking-info">
            <h2 style="color:#24437f; font-size:20px; border-bottom:1px solid #e5e5e5; padding-bottom:10px;">Your Booking</h2>
            
            <div class="flight-info-group">
                <h3>1 traveller</h3>
                <span>1 adult</span>
            </div>

            <div class="flight-info-group">
                <h3>Mon 27 Apr 2026</h3>
                <div>07:25 Singapore (SIN)</div>
                <div>08:25 Jakarta (CGK)</div>
            </div>

            <div class="flight-info-group">
                <h3>Wed 29 Apr 2026</h3>
                <div>09:05 Jakarta (CGK)</div>
                <div>11:55 Singapore (SIN)</div>
            </div>

            <div style="margin-top:20px;">
                <span style="font-weight:700;">TOTAL</span>
                <span class="price-total-amount">SGD 379.70</span>
                <p style="font-size:10px; color:#939191; clear:both;">Total for all travellers (including taxes and fees)</p>
            </div>

            <button class="btn-red" id="ga-continue-btn" style="margin-top:20px;">Continue Payment</button>
        </aside>
    </div>
</section>

<script src="main.js"></script>
<script src="https://checkoutshopper-test.adyen.com/checkoutshopper/sdk/5.66.0/adyen.js" onload="initCheckout()"></script>
</body>
</html>
